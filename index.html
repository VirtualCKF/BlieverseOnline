<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Unity WebGL Player | Blieverse Online</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="TemplateData/icon200.png">
    <link rel="icon" type="image/png" sizes="200x200" href="TemplateData/icon200.png">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // --- ïŋ―iïŋ―ïŋ―ïŋ―ÖĻïŋ―ïŋ―ïŋ―ïŋ―ïŋ― 2ïŋ―jïŋ―Û°ïŋ―ïŋ―ïŋ―ïŋ― Unity ïŋ―ïŋ― Version ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ÃŠ`ïŋ―J URL ïŋ―Ņžïŋ― ---
      var unityVersion = "0.16";
      var buildUrl = "Build";
      
      // ïŋ―Û°ĘĶb Loader ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―[ïŋ―Wïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―]ïŋ―p .js?v="0.2"ïŋ―^
      var loaderUrl = buildUrl + "/VirturalExhibition_Online.loader.js?v=" + encodeURIComponent(unityVersion);
      var config = {
        // ïŋ―Û°ĘĶbïŋ―ŌĶïŋ―ïŋ―ÖĪßļę·―ïŋ―ÉŪŨŦïŋ―ïŋ―[ïŋ―W ?v=ïŋ―ïŋ―ïŋ―ïŋ―
        dataUrl: buildUrl + "/VirturalExhibition_Online.data.unityweb?v=" + encodeURIComponent(unityVersion),
        frameworkUrl: buildUrl + "/VirturalExhibition_Online.framework.js.unityweb?v=" + encodeURIComponent(unityVersion),
        codeUrl: buildUrl + "/VirturalExhibition_Online.wasm.unityweb?v=" + encodeURIComponent(unityVersion),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Blieverse Online",
        productVersion: "0.16",
        showBanner: unityShowBanner,
      };

      // --- ïŋ―iïŋ―ÖĪïŋ― WebGL Post-Processing ïŋ―yïŋ―Zïŋ―ïŋ―ïŋ―uïŋ―ÆĄj ---
      // ïŋ―ïŋ―ïŋ―î°Šïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―]ïŋ―p iPhone Retina ïŋ―Ãđïŋ―ïŋ―^ïŋ―Wïŋ―ïŋ―ïŋ―ŅŠRïŋ―Ũīïŋ―Vïŋ―Aïŋ―ïŋ―ïŋ―ïŋ― GPU ïŋ―Lïŋ―ïŋ―ïŋ―oïŋ―Sïŋ―Aïŋ―ŅĻM 10 ïŋ―ïŋ―ïŋ―á­°ïŋ―Wïŋ―dïŋ―y
      config.devicePixelRatio = Math.min(window.devicePixelRatio, 1.6); 

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        
        // =======================================================================
        // ïŋ―iïŋ―ïŋ―ïŋ―ïŋ―ÝŪÖĪß­ŨĨïŋ―ïŋ―jïŋ―jïŋ―ïŋ―ïŋ―ïŋ―ïŋ―[ïŋ―ïŋ―ïŋ―ØĶbïŋ―ïŋ―ïŋ―ïŋ―Wïŋ―]ïŋ―Oïŋ―ïŋ―ïŋ―Ãđïŋ―ïŋ―ïŋ―ïŋ―ïŋ―wïŋ―ïŋ―Aïŋ―ïŋ―ïŋ―ïŋ―Qïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―}ïŋ―Cïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―
        container.className = "unity-mobile";
        loadingBar.style.position = "fixed";
        // =======================================================================
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          // =======================================================================
          // ïŋ―iïŋ―Nïŋ―ėĨŧïŋ―ïŋ― loadingBar.style.display = "none"; ïŋ―Ũ§ïŽ°ïŋ―Hïŋ―Uïŋ―oïŋ―ïŋ―j
          // ïŋ―ïŋ―ïŋ―Jïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Aïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ― Loading ïŋ―eïŋ―ïŋ―ïŋ―qïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―uïŋ―Þąïŋ―ïŋ―Pïŋ―ïŋ―ïŋ―vïŋ―Aïŋ―Oïŋ―Ōĩïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Bïŋ―ïŋ―ïŋ―ïŋ―ïŋ―dïŋ―eïŋ―ïŋ―ïŋ―I
          loadingBar.remove(); 
          // =======================================================================
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
